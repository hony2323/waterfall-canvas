name: Publish

on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@hony2323'

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Bump patch version
        run: |
          CURRENT=$(npm view @hony2323/waterfall-canvas version 2>/dev/null || echo "0.1.1")
          NEXT=$(node -e "const [a,b,c]='$CURRENT'.split('.').map(Number); console.log(a+'.'+b+'.'+(c+1))")
          npm version $NEXT --no-git-tag-version
          echo "Publishing version $NEXT"

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
